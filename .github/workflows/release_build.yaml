name: Build Binaries

on:
  push:
    branches:
      - main

env:
  BUILD_TYPE: RelWithDebInfo

permissions:
  contents: write

jobs:
  gen-build-number:
    name: Generate Build Number
    runs-on: ubuntu-latest
    outputs:
      build_number: ${{ steps.gen-build-number.outputs.build_number }}
    steps:
      - name: Generate build number
        id: gen-build-number
        uses: onyxmueller/build-tag-number@v1
        with:
          token: ${{secrets.github_token}}
      - name: Print new build number
        run: echo "Build number is $BUILD_NUMBER"

  create-tag:
    needs: gen-build-number
    name: Create tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Print new build number
        run: echo "Build number is ${{ needs.gen-build-number.outputs.build_number }}"
      - name: Create tag
        uses: rickstaa/action-create-tag@v1
        id: "tag_create"
        with:
          tag: "${{ needs.gen-build-number.outputs.build_number }}"
          tag_exists_error: false
          message: "Build #${{ needs.gen-build-number.outputs.build_number }}"

  build-windows:
    needs: gen-build-number
    name: Build Windows
    runs-on: windows-2019
    steps:
      - uses: actions/checkout@v3
      - name: Update build number
        run: |
          sed -i 's/Config.gameVersion = \".*\"/Config.gameVersion = \"${{ needs.gen-build-number.outputs.build_number }}\"/' "${env:GITHUB_WORKSPACE}/script/Config/App.lua"
      - name: Build
        shell: bash
        run: ./build.sh
      - name: Upload binary
        uses: actions/upload-artifact@v3
        with:
          name: ltheory-bin-win32
          path: ${{github.workspace}}/bin/*
      - name: Upload binary with assets
        uses: actions/upload-artifact@v3
        with:
          name: ltheory-distro-win32
          path: |
            ${{github.workspace}}/bin/*
            !${{github.workspace}}/bin/*.pdb
            ${{github.workspace}}/docs/*
            ${{github.workspace}}/engine/lib/phx/script/*
            ${{github.workspace}}/res/*
            ${{github.workspace}}/script/*
            ${{github.workspace}}/LICENSE
            ${{github.workspace}}/README.md

  build-macos:
    name: Build macOS
    runs-on: macos-11
    steps:
      - uses: actions/checkout@v3
      - name: Build
        run: ./build.sh
      - name: Upload binary
        uses: actions/upload-artifact@v3
        with:
          name: ltheory-bin-macos
          path: ${{github.workspace}}/bin/*

  build-ubuntu:
    name: Build Ubuntu 20.04
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v3
      - name: Update packages
        run: sudo apt-get update
      - name: Install packages
        run: sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev libasound2-dev libudev-dev
      - name: Build
        run: ./build.sh
      - name: Upload binary
        uses: actions/upload-artifact@v3
        with:
          name: ltheory-bin-ubuntu2004
          path: ${{github.workspace}}/bin/*

  release:
    name: New release
    needs:
      - gen-build-number
      - create-tag
      - build-windows
      - build-macos
      - build-ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v3
      - name: Inspect directory after downloading artifacts
        run: ls -alFR
      - name: Zip artifacts
        run: for dir in $(ls); do cd $dir && zip ../$dir.zip ./* -r && cd ..; done
      - name: Create release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: "Build #${{ needs.gen-build-number.outputs.build_number }}"
          body: "Build log: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          tag_name: "${{ needs.gen-build-number.outputs.build_number }}"
          prerelease: false
          files: ./*.zip
